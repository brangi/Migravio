<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Migravio - Offline</title>
  <style>
    body { font-family: system-ui; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f9fafb; color: #333; }
    .container { text-align: center; padding: 2rem; }
    h1 { color: #1d4ed8; font-size: 1.5rem; }
    p { color: #6b7280; margin-top: 0.5rem; }
    button { margin-top: 1rem; background: #1d4ed8; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; cursor: pointer; font-size: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>You're offline</h1>
    <p>Migravio needs an internet connection to work. Please check your connection and try again.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
